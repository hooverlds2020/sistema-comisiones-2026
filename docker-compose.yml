version: '3.8'

services:
  # 1. Base de Datos (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: comisiones_db_2026
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - internal-net

  # 2. Backend (Node.js API)
  api:
    build: ./backend
    container_name: comisiones_api_2026
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - PORT=5000
      # 🔴 Aquí inyectamos las llaves de Telegram desde el .env
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    depends_on:
      - db
    volumes:
      # 🔴 El backend guardará las imágenes aquí
      - membretes_data:/app/uploads 
    networks:
      - internal-net
      - web

  # 3. Frontend (React + Nginx)
  web:
    build: ./frontend
    container_name: comisiones_web_2026
    restart: always
    depends_on:
      - api
    volumes:
      # 🔴 El frontend leerá las imágenes desde aquí (lo inyectamos en su carpeta public)
      - membretes_data:/usr/share/nginx/html/membretes 
    networks:
      - web  # Conectado a Caddy

# 🔴 Declaramos el disco duro compartido
volumes:
  membretes_data:

networks:
  internal-net:
    driver: bridge
  web:
    external: true
